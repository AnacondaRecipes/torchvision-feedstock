{% set version = "0.23.0" %}
# see github.com/conda-forge/conda-forge.github.io/issues/1059 for naming discussion
# torchvision requires that CUDA major and minor versions match with pytorch
# https://github.com/pytorch/vision/blob/fa99a5360fbcd1683311d57a76fcc0e7323a4c1e/torchvision/extension.py#L79C1-L85C1
{% set torch_proc_type = "cuda" ~ cuda_compiler_version | replace('.', '') if gpu_variant == "cuda" else "mps" if gpu_variant == "metal" else "cpu" %}
# Upstream has specific compatability ranges for pytorch and python which are
# updated every 0.x release. https://github.com/pytorch/vision#installation
{% set compatible_pytorch = "2.8" %}

{% set build = 0 %}
# Use a higher build number for the GPU variants, to ensure that they're
# preferred by conda's solver, and they're preferentially
# installed where the platform supports it.
{% if gpu_variant != "cpu" %}
{% set build = build + 100 %}
{% endif %}

package:
  name: torchvision
  version: {{ version }}

source:
  url: https://github.com/pytorch/vision/archive/refs/tags/v{{ version }}.tar.gz
  sha256: db5a91569e5eb4a3b02e9eaad6080335f5ae3824890a697f5618541999f04027
  patches:
    # https://github.com/pytorch/vision/pull/8406/files#r1730151047
    - patches/0001-Use-system-giflib.patch
    - patches/0002-Force-nvjpeg-and-force-failure.patch
    - patches/0003-dont-test-for-turbo-jpeg.patch
    - patches/0005-use-correct-encode-jpeg-test-dir.patch
    - patches/0006-explicitly-configure-mps.patch
    - patches/0007-numpy-2-compatibility-in-dataset.patch
    - patches/0008-ffmpeg-keyframe.patch # [linux]

build:
  string: cpu_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                                                # [gpu_variant == "cpu"]
  string: cuda{{ cuda_compiler_version | replace('.', '') }}py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [gpu_variant == "cuda"]
  string: mps_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                                                # [gpu_variant == "metal"]
  number: {{ build }}
  script_env:
    # required by the setup.py script to find the right version in 0.20.1
    - BUILD_VERSION={{ version }}
  # no CUDA-enabled pytorch on aarch yet
  skip: true  # [gpu_variant == "cuda" and (not x86_64)]
  # pybind11 2.12 and pytorch 2.8 have no py314 builds
  skip: true  # [py>313]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}                   # [gpu_variant == "cuda"]
    - cuda-version {{ cuda_compiler_version }} # [gpu_variant == "cuda"]
    - libcublas-dev                          # [build_platform != target_platform and gpu_variant == "cuda"]
    - libcusolver-dev                        # [build_platform != target_platform and gpu_variant == "cuda"]
    - libcusparse-dev                        # [build_platform != target_platform and gpu_variant == "cuda"]
    - libnvjpeg-dev                          # [build_platform != target_platform and gpu_variant == "cuda"]
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - pytorch ={{ compatible_pytorch }}.*={{ torch_proc_type }}*  # [build_platform != target_platform]
  host:
    - python
    - pip
    - setuptools
    - wheel
    - cuda-version {{ cuda_compiler_version }}   # [gpu_variant == "cuda"]
    - libcublas-dev                              # [gpu_variant == "cuda"]
    - libcusolver-dev                            # [gpu_variant == "cuda"]
    - libcusparse-dev                            # [gpu_variant == "cuda"]
    - libnvjpeg-dev                              # [gpu_variant == "cuda"]
    - cuda-cudart-dev                            # [gpu_variant == "cuda"]
    - cuda-driver-dev                            # [gpu_variant == "cuda" and linux]
    # split off image/video into separate outputs?
    - jpeg {{ jpeg }}
    - libpng {{ libpng }}
    - libwebp >=1.6.0,<2.0a0
    # https://github.com/pytorch/vision/pull/8406/files#r1730151047
    - giflib
    # ffmpeg only supported on linux, and also unsupported on python 3.9: https://github.com/pytorch/vision/blob/v0.20.1/setup.py#L371
    # ffmpeg is detected at buildtime in setup.py, so no build.sh/bld.bat additions required to handle this
    - ffmpeg {{ ffmpeg }}  # [linux and (py!=39)]
    - pillow >=5.3.0,!=8.3.*
    - libtorch ={{ compatible_pytorch }}.*=*{{ torch_proc_type }}*
    - pytorch ={{ compatible_pytorch }}.*=*{{ torch_proc_type }}*
    # pybind11 2.13 has py314 support
    - pybind11 2.12
    - requests
  run:
    - python
    - pytorch ={{ compatible_pytorch }}.*=*{{ torch_proc_type }}*
    - pillow >=5.3.0,!=8.3.*

test:
  requires:
    - pip
    - libtorch ={{ compatible_pytorch }}.*=*{{ torch_proc_type }}*
  imports:
    - torchvision
    - torchvision.datasets
    - torchvision.models
    - torchvision.transforms
    - torchvision.utils
  commands:
    # use pip list to manually check that the version is correctly reported
    # Otherwise downstream package's pip check may fail
    - pip list
    - pip list | grep torchvision | grep {{ version }}         # [unix]
    - pip check

outputs:
  - name: torchvision
  - name: torchvision-tests
    build:
      string: {{ gpu_variant }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
    requirements:
      run:
        - {{ pin_subpackage('torchvision', exact=True) }}
    test:
      requires:
        - pytest
        - pytest-socket
        - requests
        - expecttest
        - scipy
        - pytest-mock
      source_files:
        - test
        - gallery
        - references
        - pytest.ini
      commands:
        - export PYTORCH_ENABLE_MPS_FALLBACK=1      # [osx and arm64]
        - python test/smoke_test.py
        # Hardcoded skip filters — cannot use Jinja2 {% set %} blocks in output test
        # sections because conda-build silently fails to render them on osx-arm64
        # during isolated test phase (multi-variant output rendering bug).
        # tests_to_skip: test_decode_gif (internet), test_kernel_bounding_boxes (CUDA accuracy)
        # osx-arm64 additionally: test_mps_error_inputs, test_backward[*mps*], test_nms_float16[mps]
        # win: test_decode_bad_encoded_data (libwebp error message change)
        - pytest --disable-socket --verbose --durations=50 -k "not (test_decode_gif or test_kernel_bounding_boxes or test_decode_bad_encoded_data)" test/test_image.py                                                            # [win]
        - pytest --disable-socket --verbose --durations=50 -k "not (test_decode_gif or test_kernel_bounding_boxes)" test/test_image.py                                                                                             # [linux]
        - pytest --disable-socket --verbose --durations=50 -k "not (test_decode_gif or test_kernel_bounding_boxes or test_mps_error_inputs or test_nms_float16)" test/test_image.py                                                 # [osx and arm64]
        - pytest --disable-socket --verbose --durations=50 -k "not (test_decode_gif or test_kernel_bounding_boxes)" test/test_transforms_v2.py                                                                                     # [not (osx and arm64)]
        - pytest --disable-socket --verbose --durations=50 -k "not (test_decode_gif or test_kernel_bounding_boxes or test_mps_error_inputs or test_backward)" test/test_transforms_v2.py                                            # [osx and arm64]
        - pytest --disable-socket --verbose --durations=50 -k "not (test_decode_gif or test_kernel_bounding_boxes)" test/test_datasets.py
        - pytest --disable-socket --verbose --durations=50 -k "not (test_decode_gif or test_kernel_bounding_boxes)" test/test_ops.py                                                                                               # [not (osx and arm64)]
        - pytest --disable-socket --verbose --durations=50 -k "not (test_decode_gif or test_kernel_bounding_boxes or test_mps_error_inputs or test_nms_float16)" test/test_ops.py                                                   # [osx and arm64]

about:
  home: https://pytorch.org/
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Image and video datasets and models for torch deep learning
  description: |
    The torchvision package consists of popular datasets, model architectures, and common image transformations for computer vision.
  dev_url: https://github.com/pytorch/vision
  doc_url: https://pytorch.org/docs/stable/index.html

extra:
  recipe-maintainers:
    - katietz
    - jjhelmus
    - nehaljwani
    - hmaarrfk
    - h-vetinari
  skip-lints:
    - python_build_tool_in_run